spring:
  cloud:
    config:
      enabled: false
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

    jpa:
      hibernate:
        ddl-auto: create-drop

    jwt:
      secret: a-string-secret-at-least-256-bits-long
      expiration: 500